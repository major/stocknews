repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: "v5.0.0"
    hooks:
      - id: check-case-conflict
      - id: check-merge-conflict
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace

  - repo: local
    hooks:
      - id: gofumpt
        name: gofumpt
        entry: go run mvdan.cc/gofumpt -w .
        language: system
        pass_filenames: false
      - id: golangci-lint
        name: golangci-lint
        entry: go run github.com/golangci/golangci-lint/v2/cmd/golangci-lint run ./...
        language: system
        pass_filenames: false

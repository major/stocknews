name: container

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  container:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false

      - name: Login to GitHub Container Registry
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5

      - name: Build and push
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf
        with:
          file: Containerfile
          platforms: linux/amd64
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ghcr.io/${{ github.repository }}:latest

      - name: Checkout selfhosted repository
        if: github.ref == 'refs/heads/main'
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          repository: major/selfhosted
          token: ${{ secrets.SELFHOSTED_PAT }}
          path: selfhosted

      - name: Configure git
        if: github.ref == 'refs/heads/main'
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Update deployment manifest
        if: github.ref == 'refs/heads/main'
        run: |
          cd selfhosted
          DIGEST="${{ steps.build.outputs.digest }}"
          sed -i -E "s|ghcr.io/major/stocknews@sha256:[a-f0-9]{64}|ghcr.io/major/stocknews@${DIGEST}|g" apps/base/stocknews/deployment.yaml

          if git diff --quiet apps/base/stocknews/deployment.yaml; then
            echo "No changes to deployment.yaml, skipping commit"
            exit 0
          fi

          git add apps/base/stocknews/deployment.yaml
          git commit -m "🤖 Update stocknews deployment to ${DIGEST}"
          git push

name: container

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  container:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false

      - name: Login to GitHub Container Registry
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5

      - name: Build and push
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf
        with:
          file: Containerfile
          platforms: linux/amd64
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ghcr.io/${{ github.repository }}:latest

      - name: Check homehosted token
        if: github.ref == 'refs/heads/main'
        env:
          HOMEHOSTED_PAT: ${{ secrets.HOMEHOSTED_PAT }}
        run: |
          if [ -z "$HOMEHOSTED_PAT" ]; then
            echo "::error::HOMEHOSTED_PAT must be a token with read/write access to major/homehosted"
            exit 1
          fi

      - name: Checkout homehosted repository
        if: github.ref == 'refs/heads/main'
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          repository: major/homehosted
          token: ${{ secrets.HOMEHOSTED_PAT }}
          path: homehosted

      - name: Configure git
        if: github.ref == 'refs/heads/main'
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Update deployment manifest
        if: github.ref == 'refs/heads/main'
        run: |
          cd homehosted
          DIGEST="${{ steps.build.outputs.digest }}"
          MANIFEST="apps/stocknews/helm/helmrelease.yaml"
          if [ ! -f "$MANIFEST" ]; then
            echo "::notice::$MANIFEST not found; skipping deployment update"
            exit 0
          fi

          sed -i -E "s|tag: latest@sha256:[a-f0-9]{64}|tag: latest@${DIGEST}|g" "$MANIFEST"

          if git diff --quiet "$MANIFEST"; then
            echo "No changes to helmrelease.yaml, skipping commit"
            exit 0
          fi

          git add "$MANIFEST"
          git commit -m "🤖 Update stocknews deployment to ${DIGEST}"
          git push
